  <head>
    <meta charset="utf-8" />
    
    <!-- Favicon (browser tab icon) -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo4.png" />
    <!-- Apple touch icon (for iOS home screen) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo4.png" />
    
    <!-- Viewport for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#306CEC" />
    
    <!-- SEO description -->
    <meta name="description" content="Impact 360 – Innovative solutions for Africa" />
    
    <!-- PWA Features - Makes it look like a native app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Impact360" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-72F4SQVF7X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-72F4SQVF7X');
    </script>
    
    <title>Impact360 Africa</title>
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('darkMode');
          const darkMode = saved ? JSON.parse(saved) : true;
          if (darkMode) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <div id="root"></div>
    
    <!-- React scripts will be injected here during build -->
